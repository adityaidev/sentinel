name: Bug Report
description: Report a defect in Sentinel
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: "Chrome 130 on Windows 11"
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console output (if any)
      render: shell
